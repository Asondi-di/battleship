<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <title>Battleship LAN</title>
    <link rel="stylesheet" href="game.css"/>
</head>
<body>
<div class="app">
    <header>
        <h1>Battleship Arena</h1>
        <p>Chrome extension, комнаты до 4 игроков, запуск только от хоста.</p>
    </header>

    <section class="panel">
        <div class="field">
            <label>Сервер WebSocket</label>
            <div class="server-url-row">
                <input id="serverUrl" value="ws://localhost:3000"/>
                <button id="detectServerUrl" type="button">Авто IP хоста</button>
            </div>
        </div>
        <div class="field">
            <label>Ваш ник</label>
            <input id="nickname" placeholder="например: Captain"/>
        </div>
        <div class="field">
            <label>Код комнаты</label>
            <input id="room" placeholder="например: squad-1"/>
        </div>
        <div class="field">
            <label>Лимит игроков (для создателя)</label>
            <select id="maxPlayers">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
            </select>
        </div>

        <div class="actions">
            <button id="createRoom">Создать комнату</button>
            <button id="joinRoom">Подключиться</button>
            <button id="autoPlace" disabled>Авторасстановка</button>
            <button id="sendFleet" disabled>Подтвердить флот</button>
            <button id="startGame" disabled>Запустить игру</button>
        </div>

        <p id="status">Статус: не подключено</p>
        <p id="turnBanner" class="turn-banner">Ожидание подключения…</p>
        <p id="roomMeta">Комната: -</p>
        <div id="players" class="players"></div>
        <div class="leaderboard-card">
            <h3>Рейтинг матча</h3>
            <div id="leaderboard" class="leaderboard"></div>
        </div>
        <div class="events-card">
            <h3>События</h3>
            <div id="events" class="events"></div>
        </div>
    </section>

    <section class="battle-grid">
        <article class="board-card">
            <h3>Ваше поле</h3>
            <div id="myBoard" class="board"></div>
        </article>


        <article class="board-card">
            <div class="target-row">
                <h3>Атака</h3>
                <select id="targetSelect"></select>
            </div>
            <div id="enemyBoard" class="board"></div>
        </article>
    </section>
</div>

<script src="game.js"></script>
</body>
</html>
